<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Minha Marca</title>

<style>
body{
    background:#ddd;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:30px;
}

.video-box{
    width:360px;
    height:640px;
    margin:40px auto;
    border:4px solid black;
}

iframe{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<h1>Minha Marca</h1>

<div class="video-box">
    <iframe id="player" frameborder="0" allowfullscreen></iframe>
</div>

<script>

function getVideoId(url) {

    if(!url) return null;

    if(url.includes("youtube.com")){
        let params = new URL(url).searchParams;
        return params.get("v");
    }

    if(url.includes("youtu.be")){
        return url.split("/").pop();
    }

    return url;
}

const params = new URLSearchParams(window.location.search);
const videoParam = params.get("v");

const videoId = getVideoId(videoParam);

if(videoId){
    document.getElementById("player").src =
        "https://www.youtube.com/embed/" + videoId;
}

</script>

</body>
</html>

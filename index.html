<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Minha Marca</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    background:#000;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

h1{
    color:white;
    margin:10px;
}

.video-container{

    width:100%;
    max-width:420px;

    aspect-ratio: 9 / 16;

    border:4px solid #222;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

.header{
    display:flex;
    align-items:center;
    gap:10px;
    color:white;
}

.header img{
    width:60px;
}

</style>

</head>

<body>

<div class="header">
    <h1>Caneca Animada</h1>
    <img src="caneca.gif" alt="Caneca animada">
</div>

<div class="video-container">
    <iframe id="player"
        allow="autoplay; fullscreen"
        allowfullscreen>
    </iframe>
</div>

<script>

function getVideoId(url){

    if(!url) return null;

    if(url.includes("youtube.com")){
        let params = new URL(url).searchParams;
        return params.get("v");
    }

    if(url.includes("youtu.be")){
        return url.split("/").pop();
    }

    return url;
}

const params = new URLSearchParams(window.location.search);
const videoParam = params.get("v");

const videoId = getVideoId(videoParam);

if(videoId){

    document.getElementById("player").src =
        "https://www.youtube.com/embed/" +
        videoId +
        "?autoplay=1&mute=1&playsinline=1";

}

</script>

</body>
</html>

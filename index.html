<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Minha Marca</title>

<style>

body{
    background:#ddd;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:30px;
    font-size:40px;
}

.video-box{
    width:360px;
    height:640px;
    margin:40px auto;
    border:4px solid black;
}

iframe{
    width:100%;
    height:100%;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-top:20px;
}

</style>
</head>

<body>

<h1>Minha Marca</h1>

<div class="video-box">
    <iframe id="player"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

<button onclick="proximoVideo()">Próximo vídeo</button>

<script>

let videos = [
    "dQw4w9WgXcQ",
    "ysz5S6PUM-U",
    "aqz-KE-bpKQ"
];

let indice = 0;

function proximoVideo(){

    indice++;

    if(indice >= videos.length){
        indice = 0;
    }

    document.getElementById("player").src =
        "https://www.youtube.com/embed/" + videos[indice];
}

</script>

</body>
</html>
